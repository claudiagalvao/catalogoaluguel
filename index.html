<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy • Aluguel de Fantasias</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">
            👑 <span>CRAZY</span> <span class="pink">FANTASY</span>
        </div>
        <p class="tagline">MONTE SEU LOOK. CAUSE IMPACTO.</p>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>QUAL VAI SER<br><span class="vibe-title">SUA VIBE HOJE?</span></h1>
            <p class="subtitle">Escolha uma vibe ou explore tudo 🔥</p>
            
            <div class="vibes" id="vibes">
                <!-- JS -->
            </div>
        </div>
    </section>

    <!-- FILTROS -->
    <div class="filters-container">
        <div class="search-bar">
            <input type="text" id="search" placeholder="Ex: arlequina, policial, anos 80...">
            <button>🔍</button>
        </div>
        
        <div class="filters">
            <select id="tamanho"><option value="">TAMANHO</option><option>P</option><option>M</option><option>G</option></select>
            <select id="genero"><option value="">GÊNERO</option><option>Feminino</option><option>Masculino</option></select>
            <select id="preco"><option value="">PREÇO</option><option value="100">Até R$100</option><option value="150">Até R$150</option></select>
            <select id="estilo"><option value="">ESTILO</option></select>
            <button id="limpar" class="btn-limpar">LIMPAR FILTROS</button>
        </div>
    </div>

    <!-- MAIS PEDIDAS -->
    <section class="section">
        <h2 class="section-title">🔥 AS MAIS PEDIDAS</h2>
        <div class="carousel" id="carousel">
            <!-- JS -->
        </div>
    </section>

    <!-- BANNERS DE CATEGORIAS -->
    <section class="banners">
        <div class="banner" onclick="filtrarCategoria('casal')">
            <img src="assets/images/banner-casal.webp" alt="Casal">
            <div class="banner-text">
                <h3>FANTASIAS PARA CASAL</h3>
                <button>VER OPÇÕES →</button>
            </div>
        </div>
        <!-- Repita para os outros 3 banners -->
    </section>

    <script src="js/script.js"></script>
</body>
</html>
