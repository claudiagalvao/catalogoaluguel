<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Crazy Fantasy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
  <h1>CRAZY <span>FANTASY</span></h1>
</header>

<section class="hero">
  <input id="search" placeholder="Buscar fantasia...">

  <div class="filters">
    <select id="tamanho"><option value="">Tamanho</option><option>P</option><option>M</option><option>G</option></select>
    <select id="genero"><option value="">Gênero</option><option>Feminino</option><option>Masculino</option></select>
    <select id="preco"><option value="">Preço</option><option value="100">Até 100</option><option value="150">Até 150</option></select>
    <select id="estilo"><option value="">Estilo</option><option value="casal">Casal</option><option value="grupo">Grupo</option><option value="festa">Festa</option></select>
    <button id="clear">Limpar</button>
  </div>
</section>

<section>
  <h3>🔥 As mais pedidas</h3>
  <div class="carousel">
    <button id="prev">←</button>
    <div id="track"></div>
    <button id="next">→</button>
  </div>
</section>

<section id="grid"></section>

<section class="banners">
  <button onclick="filtrarCategoria('casal')">💑 Casal</button>
  <button onclick="filtrarCategoria('grupo')">👯 Grupo</button>
  <button onclick="filtrarCategoria('festa')">🎉 Festa</button>
  <button onclick="filtrarCategoria('trending')">🔥 Mais alugadas</button>
</section>

<footer>
  <p>🚚 Entrega rápida | 🔒 Seguro | 💬 WhatsApp | ⭐ Premium</p>
</footer>

<div id="modal" class="modal hidden"></div>

<script src="js/app.js"></script>
</body>
</html>
